<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk — OpenBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --surface-2: #111111;
      --text: #ffffff;
      --text-2: #a0a0a0;
      --text-3: #666666;
      --border: rgba(255,255,255,0.08);
      --accent: #ffffff;
      --error: #ff4444;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f8f8f8;
      --surface-2: #f0f0f0;
      --text: #000000;
      --text-2: #555555;
      --text-3: #888888;
      --border: rgba(0,0,0,0.08);
      --accent: #000000;
      --error: #d32f2f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.5s ease, color 0.5s ease;
    }

    /* Background effects */
    .bg-effects {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
    }

    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      top: -100px; right: -100px;
      animation: float 15s ease-in-out infinite;
    }

    .bg-orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      bottom: -100px; left: -100px;
      animation: float 18s ease-in-out infinite reverse;
    }

    [data-theme="light"] .bg-orb-1 {
      background: radial-gradient(circle, rgba(0,0,0,0.04) 0%, transparent 70%);
    }
    [data-theme="light"] .bg-orb-2 {
      background: radial-gradient(circle, rgba(0,0,0,0.03) 0%, transparent 70%);
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30px, 20px) scale(1.08); }
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Login Container */
    .login-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 0 1.5rem;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo {
      width: 64px; height: 64px;
      margin: 0 auto 1.25rem;
      position: relative;
    }

    .login-logo svg {
      width: 100%; height: 100%;
    }

    .login-logo::after {
      content: '';
      position: absolute;
      inset: -10px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .login-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: var(--text-2);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-2);
    }

    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.05);
    }

    [data-theme="light"] .form-input:focus {
      border-color: rgba(0,0,0,0.3);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
    }

    .form-input::placeholder {
      color: var(--text-3);
    }

    .btn-submit {
      width: 100%;
      padding: 0.875rem;
      background: var(--text);
      color: var(--bg);
      border: 1px solid var(--text);
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      margin-top: 0.5rem;
    }

    .btn-submit:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--text-3);
      font-size: 0.8rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .social-login {
      display: flex;
      gap: 0.75rem;
    }

    .social-btn {
      flex: 1;
      padding: 0.75rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .social-btn:hover {
      border-color: rgba(255,255,255,0.2);
      background: var(--surface);
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--text-2);
    }

    .login-footer a {
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.3s ease;
    }

    .login-footer a:hover {
      opacity: 0.7;
    }

    .demo-btn {
      display: block;
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.75rem;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 12px;
      color: var(--text-2);
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.875rem;
      font-family: inherit;
    }

    .demo-btn:hover {
      border-color: var(--text-3);
      color: var(--text);
    }

    .theme-toggle-login {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 10;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .theme-toggle-login:hover {
      transform: scale(1.05);
      border-color: var(--text-3);
    }

    .back-link {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-2);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.3s ease;
      padding: 0.5rem;
      border-radius: 8px;
    }

    .back-link:hover {
      color: var(--text);
      background: var(--surface);
    }

    .error-msg {
      background: rgba(255,68,68,0.1);
      border: 1px solid rgba(255,68,68,0.2);
      color: var(--error);
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }

    .error-msg.show {
      display: block;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    @media (max-width: 480px) {
      .login-card { padding: 1.75rem; border-radius: 20px; }
      .login-header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="bg-effects">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
  </div>
  <div class="noise"></div>

  <a href="index.html" class="back-link">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Kembali
  </a>

  <button class="theme-toggle-login" id="themeToggle" aria-label="Toggle theme">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  </button>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M32 4L56 16V44L32 56L8 44V16L32 4Z" stroke="currentColor" stroke-width="2.5" fill="none"/>
            <path d="M32 4V28" stroke="currentColor" stroke-width="2.5"/>
            <path d="M32 28L56 16" stroke="currentColor" stroke-width="2.5"/>
            <path d="M32 28L8 16" stroke="currentColor" stroke-width="2.5"/>
            <path d="M32 28V56" stroke="currentColor" stroke-width="2.5" stroke-dasharray="4 4"/>
            <rect x="18" y="8" width="4" height="8" rx="1" fill="currentColor" opacity="0.8"/>
            <rect x="42" y="8" width="4" height="8" rx="1" fill="currentColor" opacity="0.8"/>
          </svg>
        </div>
        <h1>Selamat Datang</h1>
        <p>Masuk ke akun OpenBox Anda</p>
      </div>

      <div class="error-msg" id="errorMsg">Email atau password salah</div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="nama@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit">Masuk</button>
      </form>

      <button class="demo-btn" id="demoBtn">🚀 Akses Demo Langsung</button>

      <div class="divider">atau masuk dengan</div>

      <div class="social-login">
        <button class="social-btn" onclick="socialLogin('google')">
          <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="social-btn" onclick="socialLogin('github')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          GitHub
        </button>
      </div>

      <div class="login-footer">
        Belum punya akun? <a href="#">Daftar sekarang</a>
      </div>
    </div>
  </div>

  <script>
    // Theme
    const savedTheme = localStorage.getItem('openbox-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.getElementById('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('openbox-theme', next);
    });

    // Login form
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Demo validation
      if (email && password.length >= 6) {
        localStorage.setItem('openbox-user', JSON.stringify({ email, name: email.split('@')[0] }));
        window.location.href = 'chat.html';
      } else {
        const err = document.getElementById('errorMsg');
        err.textContent = 'Password minimal 6 karakter';
        err.classList.add('show');
        setTimeout(() => err.classList.remove('show'), 3000);
      }
    });

    // Demo access
    document.getElementById('demoBtn').addEventListener('click', () => {
      localStorage.setItem('openbox-user', JSON.stringify({ email: 'demo@openbox.ai', name: 'Demo User' }));
      window.location.href = 'chat.html';
    });

    function socialLogin(provider) {
      localStorage.setItem('openbox-user', JSON.stringify({ email: provider + '@openbox.ai', name: provider + ' User' }));
      window.location.href = 'chat.html';
    }
  </script>
</body>
</html>
